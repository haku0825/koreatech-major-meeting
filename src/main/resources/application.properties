spring.application.name=koreatech-major-meeting

spring.datasource.url=jdbc:h2:mem:koreatech-major-meeting;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

security.jwt.secret=replace-this-with-at-least-32-characters-for-jwt-secret-key-2026
security.jwt.access-token-validity-seconds=3600
